# Energy Turrets - we're using frontier ones because its better
- type: entity
  id: BaseWeaponTurretEnergyTriad
  name: laser turret
  abstract: true
  parent:
  - BaseTurretSearchBeam
  - BaseWeaponTurretEnergyNF
  components:
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Turrets/laser.rsi
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
      params:
        variation: 0.125
  - type: HitscanBatteryAmmoProvider
    proto: RedLightLaser # Deals 10 Heat Damage
    fireCost: 10

